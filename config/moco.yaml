training:
  exploitation_mode: True # Desactiva AAC, fija temp y usa best_ckpt
  seed: 42
  epochs: 18 # Entrenar 15 epochs más (si venimos de la 3)
  warmup_epochs: 0 # Sin warmup para fine-tuning
  final_lr_ratio: 0.1 # Para que el cosine decay termine en un LR suave y no en cero
  batch_size: 48
  grad_accum_steps: 4
  num_workers: 4
  lr_base: 0.005 # Bajado de 0.015 para un LR final de ~0.0075
  weight_decay: 0.0001
  use_amp: True
  save_every: 10
  early_stopping_patience: 50

moco:
  dim: 256
  queue: 16384
  momentum_base: 0.999
  temp_start: 0.14
  temp_end: 0.11
  temp_warmup_steps: 100
  # MoCo v3: Predictor MLP (cabeza de predicción para queries solamente)
  predictor_hidden_dim: 4096
  # Multi-Crop DINO-style: Vistas locales adicionales de alta granularidad
  num_local_crops: 4          # 0 para desactivar (backward-compatible)
  local_crop_scale_min: 0.05  # Escala mínima del recorte local (% del área)
  local_crop_scale_max: 0.40  # Escala máxima del recorte local
  local_crop_size: 96         # Resolución de vistas locales en píxeles
  local_loss_weight: 0.5      # Peso de la pérdida de vistas locales vs. globales

paths:
  dataset_root: "/kaggle/input/datasets/joaquinignaciopetcho/base-soja-encoder-full/BASE-SOJA-ENCODER-FULL"
  eval_train_root: "/kaggle/input/datasets/joaquinignaciopetcho/base-soja-encoder-full/BASE-SOJA-ENCODER-FULL/train"
  eval_val_root: "/kaggle/input/datasets/joaquinignaciopetcho/base-soja-encoder-full/BASE-SOJA-ENCODER-FULL/val"
  checkpoint_path: "/kaggle/working/moco_checkpoint.pth"
  best_checkpoint_path: "/kaggle/working/moco_best_checkpoint.pth"
  encoder_export_path: "/kaggle/working/moco_encoder_ready.pth"
  metrics_path: "/kaggle/working/ssl_metrics.json"
  index_cache_path: "/kaggle/working/train_index.npy"

eval:
  subset_size: 1000
  knn_k: 20

wandb:
  enabled: true
  project: "MoCo-ENCODER"